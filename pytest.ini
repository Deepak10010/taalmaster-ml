[pytest]
# Keep pytest output predictable on Windows and avoid loading unrelated
# third-party plugins that may be globally installed.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra --strict-markers
markers =
    slow: tests that hit the live DB or train a model (skipped by default in CI)
    integration: end-to-end pipeline tests
