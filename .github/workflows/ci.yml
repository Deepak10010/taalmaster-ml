name: CI

# Runs on every pull request + every push to main.
# Keeps main always in a releasable state and surfaces failures before merge.
on:
  pull_request:
  push:
    branches: [main]

# Prevents two pushes to the same branch from piling up queued runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + DVC validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # config.py reads DATABASE_URL at import time and raises if missing, so
    # we feed it a dummy URL here. Unit + integration tests never actually
    # connect — they use synthetic data — so any syntactically-valid
    # Postgres URL works. Real CI against Neon would add DATABASE_URL as a
    # GitHub Actions secret.
    env:
      DATABASE_URL: "postgresql://ci-dummy:ci-dummy@localhost:5432/ci-dummy"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # The pip cache is keyed on requirements.txt — hits after the
          # first run shave ~60s off every subsequent CI run.
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- Unit tests ---------------------------------------------------------
      # Pure-Python, no network. Locks down the temporal-split invariants so
      # target leakage can't silently creep back in.
      - name: Run unit tests
        run: pytest tests/test_feature_engineering.py -v

      # --- Integration tests --------------------------------------------------
      # Uses synthetic data (training.train.generate_synthetic_data), trains
      # a real XGBoost, writes artifacts to a tmp dir. No Neon / network.
      - name: Run pipeline integration tests
        run: pytest tests/test_pipeline_integration.py -v

      # --- DVC pipeline definition validation --------------------------------
      # `dvc dag` parses dvc.yaml + dvc.lock + params.yaml and errors out on
      # any inconsistency (missing deps, undefined outputs, param typos, etc).
      # Doesn't actually run any stages.
      - name: Validate DVC pipeline
        run: dvc dag

      # --- params.yaml syntax -------------------------------------------------
      # Cheap belt-and-braces check — catches YAML indentation mistakes before
      # they break `dvc repro` in a confusing way.
      - name: Validate params.yaml
        run: python -c "import yaml, sys; yaml.safe_load(open('params.yaml')); print('params.yaml OK')"

      # --- Smoke import check -------------------------------------------------
      # Imports every top-level module. Catches things that lint-only CIs miss:
      # circular imports, missing module-level deps, typos in `from X import Y`.
      - name: Smoke import all packages
        run: |
          python -c "
          import importlib
          for mod in [
              'config',
              'ingestion.data_extraction',
              'transformation.feature_engineering',
              'training.train',
              'training.compare_models',
              'evaluation.backtest',
              'evaluation.drift_check',
              'inference.predict',
              'inference.prediction_logger',
              'serving.api',
              'serving.prediction_cache',
              'scripts.run_extract',
              'scripts.run_features',
              'scripts.run_train',
          ]:
              importlib.import_module(mod)
              print(f'ok: {mod}')
          "
